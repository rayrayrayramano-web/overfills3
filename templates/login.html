<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overfills — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0d1b2a;
      --steel: #1b2d40;
      --teal:  #00c2a8;
      --teal2: #00968a;
      --muted: #6b8fa8;
      --white: #ffffff;
      --red:   #ff4d6d;
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,194,168,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,194,168,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 6px;
      line-height: 1;
    }

    .logo span { color: var(--teal); }

    .card {
      background: var(--steel);
      border: 1px solid rgba(0,194,168,.2);
      border-radius: 16px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--teal2), transparent);
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(0,194,168,.25);
      border-radius: 8px;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      letter-spacing: 6px;
      outline: none;
      transition: border-color .2s;
    }

    input[type="password"]:focus {
      border-color: var(--teal);
    }

    input[type="password"]::placeholder {
      letter-spacing: 3px;
      font-size: 14px;
      color: var(--muted);
    }

    .error {
      margin-top: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--red);
      text-align: center;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: var(--teal);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s ease;
    }

    button:hover {
      background: var(--white);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Over<span>fills</span></div>
    </header>
    <div class="card">
      <form method="POST" action="/login">
        <label class="label">Enter Password</label>
        <input type="password" name="password" placeholder="······" autofocus />
        {% if error %}
          <div class="error">⚠ {{ error }}</div>
        {% endif %}
        <button type="submit">Unlock</button>
      </form>
    </div>
  </div>
</body>
</html>
